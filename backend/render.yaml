services:
  - type: web
    name: job-assistant-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RELOAD
        value: "0"
    # Free tier — spins down after 15 min of inactivity, wakes on first request
    plan: free
