services:
  - type: web
    name: job-assistant-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RELOAD
        value: "0"
      - key: ANTHROPIC_API_KEY
        sync: false   # set this manually in Render dashboard
    plan: free
